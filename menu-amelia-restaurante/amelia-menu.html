<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amelia — Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background-color: #080808;
  color: #F5F0E8;
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

:root {
  --gold:      #C9A84C;
  --gold-lt:   #E8C97A;
  --gold-dim:  #8B6E2A;
  --white:     #F5F0E8;
  --black:     #080808;
}

/* ── HERO ── */
.hero {
  background-color: #080808;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 60px 24px 100px;
  text-align: center;
  overflow: hidden;
}

.hero-glow {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}

.hero-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.08);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation: pulse 5s ease-in-out infinite;
}
.ring1{width:420px;height:420px;}
.ring2{width:620px;height:620px;animation-delay:1.5s;}
.ring3{width:820px;height:820px;animation-delay:3s;}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.55}}

.hero-content { position: relative; z-index: 2; }

.eyebrow {
  color: #C9A84C;
  font-size: 10px;
  letter-spacing: 6px;
  text-transform: uppercase;
  font-weight: 300;
  margin-bottom: 20px;
  display: block;
  animation: fadeUp 1s ease both 0.3s;
}

.hero-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(80px, 18vw, 150px);
  line-height: 0.9;
  background: linear-gradient(150deg, #E8C97A 0%, #C9A84C 50%, #8B6E2A 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: fadeUp 1s ease both 0.5s;
}

.hero-tagline {
  color: rgba(245,240,232,0.45);
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-top: 20px;
  margin-bottom: 48px;
  display: block;
  animation: fadeUp 1s ease both 0.7s;
}

.divider-line {
  width: 80px; height: 1px;
  background: linear-gradient(90deg, transparent, #C9A84C, transparent);
  margin: 0 auto 40px;
  animation: fadeIn 1s ease both 0.9s;
}

/* ── NAV ── */
.nav-wrap {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeUp 1s ease both 1.1s;
}

.nav-btn {
  background: transparent;
  border: 1px solid rgba(201,168,76,0.3);
  color: rgba(245,240,232,0.6);
  font-family: 'Raleway', sans-serif;
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 12px 24px;
  cursor: pointer;
  transition: all 0.35s ease;
}
.nav-btn:hover  { border-color:rgba(201,168,76,0.7); color:#E8C97A; background:rgba(201,168,76,0.06); }
.nav-btn.active { border-color:#C9A84C; color:#E8C97A; background:rgba(201,168,76,0.1); }

/* ── SECTIONS ── */
.section { display:none; background-color:#080808; min-height:100vh; padding:70px 0 100px; }
.section.active { display:block; }

.sec-header { text-align:center; padding:0 24px; margin-bottom:50px; }
.sec-label  { display:block; color:#C9A84C; font-size:10px; letter-spacing:6px; text-transform:uppercase; margin-bottom:14px; }
.sec-title  { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; font-size:clamp(40px,8vw,60px); color:#F5F0E8; line-height:1; }
.sec-divider{ width:100px; height:1px; background:linear-gradient(90deg,transparent,#C9A84C,transparent); margin:20px auto 0; }

/* ── DISH LIST ── */
.dish-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: rgba(201,168,76,0.12);
}

.dish-row {
  background: #0D0D0D;
  display: flex;
  align-items: stretch;
  cursor: pointer;
  transition: background 0.3s;
  overflow: hidden;
  min-height: 120px;
}
.dish-row:hover { background:#141414; }

.dish-img-wrap {
  width: 120px; min-width: 120px; height: 120px;
  overflow: hidden; flex-shrink: 0;
}
.dish-img-wrap img {
  width:100%; height:100%;
  object-fit:cover;
  filter:brightness(0.85) saturate(0.9);
  transition:transform 0.5s ease;
  display:block;
}
.dish-row:hover .dish-img-wrap img { transform:scale(1.07); }

.dish-img-placeholder {
  width:100%; height:100%;
  background:linear-gradient(135deg,#1a1a1a,#0d0d0d);
  display:flex; align-items:center; justify-content:center;
  font-size:32px;
}

.dish-left-accent {
  width:2px; min-width:2px;
  background:linear-gradient(to bottom,#E8C97A,#8B6E2A);
  opacity:0; transition:opacity 0.3s;
}
.dish-row:hover .dish-left-accent { opacity:1; }

.dish-body {
  flex:1; padding:18px 20px;
  display:flex; flex-direction:column; justify-content:center;
}
.dish-num  { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:11px; color:#8B6E2A; letter-spacing:2px; margin-bottom:5px; }
.dish-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:#F5F0E8; margin-bottom:4px; line-height:1.2; }
.dish-sub  { font-size:11px; color:rgba(245,240,232,0.45); letter-spacing:0.5px; line-height:1.5; }

.dish-tags-row { display:flex; gap:5px; margin-top:8px; flex-wrap:wrap; }
.tag { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:#8B6E2A; border:1px solid rgba(201,168,76,0.18); padding:2px 7px; }

.dish-price-col { padding:18px 20px 18px 8px; display:flex; align-items:center; justify-content:flex-end; flex-shrink:0; }
.dish-price { font-family:'Cormorant Garamond',serif; font-size:18px; color:#E8C97A; text-align:right; line-height:1.2; }
.dish-price small { display:block; font-family:'Raleway',sans-serif; font-size:9px; color:#8B6E2A; letter-spacing:2px; font-weight:200; }

/* ── BEVERAGE LIST ── */
.bev-list { display:flex; flex-direction:column; gap:1px; background:rgba(201,168,76,0.12); }

.bev-row {
  background:#0D0D0D;
  display:flex; align-items:center;
  cursor:pointer; transition:background 0.3s;
  overflow:hidden; min-height:90px;
}
.bev-row:hover { background:#141414; }

.bev-img-wrap {
  width:90px; min-width:90px; height:90px;
  overflow:hidden; flex-shrink:0;
}
.bev-img-wrap img {
  width:100%; height:100%;
  object-fit:cover;
  filter:brightness(0.85) saturate(0.85);
  transition:transform 0.5s ease;
  display:block;
}
.bev-row:hover .bev-img-wrap img { transform:scale(1.07); }

.bev-icon-wrap {
  width:90px; min-width:90px; height:90px;
  display:flex; align-items:center; justify-content:center;
  font-size:26px;
  background:rgba(201,168,76,0.04);
  flex-shrink:0;
}

.bev-body { flex:1; padding:16px; }
.bev-name { font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:400; color:#F5F0E8; margin-bottom:3px; }
.bev-sub  { font-size:11px; color:rgba(245,240,232,0.4); }

.bev-price-col { padding:16px 20px; flex-shrink:0; }
.bev-price { font-family:'Cormorant Garamond',serif; font-size:17px; color:#E8C97A; text-align:right; }
.bev-price small { display:block; font-family:'Raleway',sans-serif; font-size:9px; color:#8B6E2A; letter-spacing:2px; font-weight:200; }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.9); z-index:9000;
  align-items:flex-end; justify-content:center;
  backdrop-filter:blur(10px);
}
.modal-overlay.open { display:flex; }

.modal-sheet {
  background:#111111;
  border-top:1px solid rgba(201,168,76,0.2);
  width:100%; max-width:600px; max-height:92vh;
  overflow-y:auto; position:relative;
  animation:slideUp 0.4s cubic-bezier(0.34,1.1,0.64,1);
}
@keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-img {
  width:100%; height:220px;
  object-fit:cover; filter:brightness(0.8); display:block;
}
.modal-img-placeholder {
  width:100%; height:180px;
  background:linear-gradient(135deg,#1a1a1a,#0e0e0e);
  display:flex; align-items:center; justify-content:center; font-size:60px;
}

.modal-body { padding:32px 28px 40px; }

.modal-close {
  position:absolute; top:16px; right:20px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(201,168,76,0.3);
  color:#C9A84C; width:36px; height:36px; border-radius:50%;
  cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.3s; z-index:10;
}
.modal-close:hover { background:rgba(201,168,76,0.15); }

.m-num  { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:#8B6E2A; letter-spacing:3px; margin-bottom:8px; display:block; }
.m-name { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:300; color:#F5F0E8; line-height:1.1; margin-bottom:6px; }
.m-sub  { font-size:11px; color:#C9A84C; letter-spacing:3px; text-transform:uppercase; margin-bottom:20px; display:block; }
.m-bar  { width:50px; height:1px; background:linear-gradient(90deg,#C9A84C,transparent); margin-bottom:18px; }
.m-desc { font-size:14px; line-height:1.8; color:rgba(245,240,232,0.65); margin-bottom:14px; }
.m-ing  { font-size:11px; color:#8B6E2A; letter-spacing:0.5px; line-height:1.8; margin-bottom:24px; }
.m-footer { display:flex; align-items:center; justify-content:space-between; padding-top:18px; border-top:1px solid rgba(201,168,76,0.12); }
.m-price  { font-family:'Cormorant Garamond',serif; font-size:28px; color:#E8C97A; }
.m-tags   { display:flex; gap:6px; flex-wrap:wrap; }

/* ── FOOTER ── */
.page-footer { background:#080808; text-align:center; padding:50px 24px; border-top:1px solid rgba(201,168,76,0.1); }
.page-footer .fn  { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:26px; color:#C9A84C; margin-bottom:10px; }
.page-footer .fn2 { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(245,240,232,0.3); }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── SCROLL CUE ── */
.scroll-cue {
  position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  cursor:pointer; animation:fadeIn 1.2s ease both 1.6s;
}
.scroll-cue span { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:#8B6E2A; }
.scroll-line { width:1px; height:36px; background:linear-gradient(#8B6E2A,transparent); animation:scrollPulse 2s ease-in-out infinite; }
@keyframes scrollPulse { 0%,100%{opacity:.4}50%{opacity:1} }

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .dish-img-wrap{width:90px;min-width:90px;height:90px;}
  .dish-body{padding:14px 12px;}
  .dish-price-col{padding:14px 12px 14px 4px;}
  .dish-name{font-size:17px;}
  .bev-img-wrap,.bev-icon-wrap{width:72px;min-width:72px;height:72px;}
}
</style>
</head>

<!-- ══ HERO ══ -->
<section class="hero" id="top">

  <div class="hero-ring ring2"></div>

</section>

<!-- ══ ENTRADAS ══ -->
<section class="section active" id="entradas">

    <div class="sec-divider"></div>
  </div>
  <div class="dish-list" id="list-entradas"></div>
</section>

<!-- ══ PLATOS ══ -->
<section class="section" id="platos">

<!-- ══ POSTRES ══ -->
<section class="section" id="postres">

</section>

<!-- ══ BEBIDAS ══ -->
<section class="section" id="bebidas">

    <span class="sec-label">Selección de autor</span>
    <h2 class="sec-title">Bebidas</h2>
    <div class="sec-divider"></div>
  </div>
  <div class="bev-list" id="list-bebidas"></div>
</section>

<!-- ══ FOOTER ══ -->
<footer class="page-footer">
  <p class="fn">Amelia</p>
  <p class="fn2">Todos los precios incluyen ITBIS · Propina no incluida</p>
</footer>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal" onclick="maybeClose(event)">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="m-img-wrap"></div>
    <div class="modal-body">
      <span class="m-num"  id="m-num"></span>
      <h2   class="m-name" id="m-name"></h2>
      <span class="m-sub"  id="m-sub"></span>
      <div  class="m-bar"></div>
      <p    class="m-desc" id="m-desc"></p>
      <p    class="m-ing"  id="m-ing"></p>
      <div  class="m-footer">
        <span class="m-price" id="m-price"></span>
        <div  class="m-tags"  id="m-tags"></div>
      </div>
    </div>
  </div>
</div>

// ── RENDER DISHES ──
function dishImgHtml(d) {
  if (d.img) {
    const esc = d.emoji.replace(/'/g,"\\'");
    return `<div class="dish-img-wrap">
      <img src="${d.img}" alt="${d.name}" loading="lazy"
           onerror="this.parentElement.innerHTML='<div class=\\'dish-img-placeholder\\'>${esc}</div>'">
    </div>`;
  }
  return `<div class="dish-img-wrap"><div class="dish-img-placeholder">${d.emoji}</div></div>`;
}

['entradas','platos','postres'].forEach(cat => {
  document.getElementById(`list-${cat}`).innerHTML = menu[cat].map((d, i) => {
    const tags = (d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    return `
    <div class="dish-row" onclick="openDish('${cat}',${i})">
      ${dishImgHtml(d)}
      <div class="dish-left-accent"></div>
      <div class="dish-body">
        <span class="dish-num">No. ${String(i+1).padStart(2,'0')}</span>
        <h3 class="dish-name">${d.name}</h3>
        <p class="dish-sub">${d.sub}</p>
        <div class="dish-tags-row">${tags}</div>
      </div>
      <div class="dish-price-col">
        <div class="dish-price">${d.price}<small>DOP</small></div>
      </div>
    </div>`;
  }).join('');
});

// ── RENDER BEVERAGES ──
document.getElementById('list-bebidas').innerHTML = menu.bebidas.map((d,i) => {
  const thumb = d.img
    ? `<div class="bev-img-wrap"><img src="${d.img}" alt="${d.name}" loading="lazy"
         onerror="this.parentElement.outerHTML='<div class=\\'bev-icon-wrap\\'>${d.emoji}</div>'"></div>`
    : `<div class="bev-icon-wrap">${d.emoji}</div>`;
  return `
  <div class="bev-row" onclick="openBev(${i})">
    ${thumb}
    <div class="bev-body">
      <h3 class="bev-name">${d.name}</h3>
      <p class="bev-sub">${d.sub}</p>
    </div>
    <div class="bev-price-col">
      <div class="bev-price">${d.price}<small>DOP</small></div>
    </div>
  </div>`;
}).join('');

// ── NAVIGATION ──
function show(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  document.getElementById(id).scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── MODAL ──
function openDish(cat, i) {
  const d = menu[cat][i];
  document.getElementById('m-img-wrap').innerHTML = d.img
    ? `<img class="modal-img" src="${d.img}" alt="${d.name}"
            onerror="this.outerHTML='<div class=\\'modal-img-placeholder\\'>${d.emoji}</div>'">`
    : `<div class="modal-img-placeholder">${d.emoji}</div>`;
  document.getElementById('m-num').textContent   = `No. ${String(i+1).padStart(2,'0')}`;
  document.getElementById('m-name').textContent  = d.name;
  document.getElementById('m-sub').textContent   = d.sub;
  document.getElementById('m-desc').textContent  = d.desc;
  document.getElementById('m-ing').textContent   = d.ing ? `Ingredientes: ${d.ing}` : '';
  document.getElementById('m-price').textContent = d.price;
  document.getElementById('m-tags').innerHTML    = (d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  openModal();
}

function openBev(i) {
  const d = menu.bebidas[i];
  document.getElementById('m-img-wrap').innerHTML = d.img
    ? `<img class="modal-img" src="${d.img}" alt="${d.name}"
            onerror="this.outerHTML='<div class=\\'modal-img-placeholder\\'>${d.emoji}</div>'">`
    : `<div class="modal-img-placeholder">${d.emoji}</div>`;
  document.getElementById('m-num').textContent   = '';
  document.getElementById('m-name').textContent  = d.name;
  document.getElementById('m-sub').textContent   = d.sub;
  document.getElementById('m-desc').textContent  = d.desc;
  document.getElementById('m-ing').textContent   = '';
  document.getElementById('m-price').textContent = d.price;
  document.getElementById('m-tags').innerHTML    = '';
  openModal();
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function maybeClose(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
